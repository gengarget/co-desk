services:
  - type: web
    name: co-desk-api
    env: docker
    plan: free
    dockerfilePath: ./server/Dockerfile
    dockerContext: ./server
    healthCheckPath: /api/health
    envVars:
      - key: HOST
        value: 0.0.0.0
      - key: CODESK_DATA_DIR
        value: /app/data
      - key: CODESK_CORS_REGEX
        value: .*
